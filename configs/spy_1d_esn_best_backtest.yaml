ticker: SPY
interval: 1d
start: "2010-01-01"
end: null

input_path: data/processed/SPY/1d/SPY_all_signals.csv

data:
  auto_download: true

cpm:
  p_values: [0.03, 0.04, 0.05, 0.06, 0.07, 0.08, 0.10, 0.12]
  t_values: [2, 4, 6, 8, 10, 12, 14, 16, 18]
  selection_method: pareto_knee

ma_ga:
  population_size: 50
  generations: 30
  cx_prob: 0.7
  mut_prob: 0.3
  seed: 42
  match_window: 5

esn:
  target_col: triangle_target
  target_shift: 0
  train_ratio: 0.7
  val_ratio: 0.15
  test_ratio: 0.15
  feature_cols:
    - ma_signal
    - rsi_signal
    - roc_signal
    - stoch_signal
    - candle_hammer_hanging_man_signal
    - candle_dark_cloud_cover_signal
    - candle_piercing_line_signal
    - candle_bullish_engulfing_signal
    - candle_bearish_engulfing_signal
  reservoir_size: 100
  spectral_radius: 0.9
  sparsity: 0.15
  input_scale: 0.3
  leaking_rate: 0.3
  ridge_alpha: 200.0
  washout: 30
  random_state: 42
  threshold: 0.1
  threshold_values: [0.1]
